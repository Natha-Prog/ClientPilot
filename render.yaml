# Render: API only (Postgres = Supabase, frontend = Netlify)
services:
  - type: web
    name: clientpilot-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install --prefix server && cd server && npx prisma generate
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard (Supabase connection strings)
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Update with your real Netlify URL after first deploy
      - key: CLIENT_URL
        value: https://client-pilot.netlify.app
      - key: ADMIN_EMAIL
        value: admin@clientpilot.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrateur
