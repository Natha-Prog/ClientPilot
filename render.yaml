services:
  # PostgreSQL Database
  - type: postgres
    name: clientpilot-db
    databaseName: clientpilot
    user: clientpilot
    plan: free
    ipAllowList: []

  # Web Service (Backend + Frontend)
  - type: web
    name: clientpilot
    env: node
    plan: free
    buildCommand: cd client && npm install && npx vite build && cd ../server && npm install && npx prisma generate
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clientpilot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: CLIENT_URL
        value: https://clientpilot.onrender.com
