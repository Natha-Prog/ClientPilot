services:
  # PostgreSQL Database
  - type: postgres
    name: clientpilot-db
    databaseName: clientpilot
    user: clientpilot
    plan: free
    ipAllowList: []

  # Web Service (Backend + Frontend)
  - type: web
    name: clientpilot
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clientpilot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3001
      - key: CLIENT_URL
        value: https://clientpilot.onrender.com
